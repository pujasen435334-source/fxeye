<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inquiry — fxeye</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
<style>
:root{
  --bg:#070B12;
  --border:rgba(255,255,255,.1);
  --ink:#EAEFF8;
  --muted:#8B96AC;
  --muted-dim:#5C6680;
  --bull:#00D9A3;
  --grad-bull:linear-gradient(135deg,#00D9A3,#00A8E8);
  --r:8px;
  --fn:'Inter',sans-serif;
  --fd:'Space Grotesk',sans-serif;
  --fm:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--ink);font-family:var(--fn);}

/* ── TOP NAV ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 28px;border-bottom:1px solid var(--border);
}
.back-btn{
  display:inline-flex;align-items:center;gap:7px;
  font-size:13px;font-weight:600;color:var(--muted);
  text-decoration:none;transition:color .18s;
}
.back-btn:hover{color:#6D28D9;}

/* ── PAGE BODY ── */
.page{max-width:520px;margin:48px auto 0;padding:0 20px;}

.page-heading{margin-bottom:24px;}
.page-heading h1{font-family:var(--fd);font-size:26px;font-weight:700;letter-spacing:-0.025em;margin-bottom:6px;}
.page-heading p{font-size:13px;color:var(--muted);line-height:1.7;}

/* ── FIELDS ── */
.field{margin-bottom:16px;}
.field label{
  display:block;font-size:11.5px;font-weight:700;
  color:var(--muted);font-family:var(--fm);
  letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;
}
.field input{
  width:100%;padding:14px 16px;
  background:#0E1420;
  border:1px solid var(--border);
  border-radius:var(--r);
  color:var(--ink);font-family:var(--fn);font-size:15px;
  outline:none;transition:border-color .2s;
  -webkit-appearance:none;
}
.field input::placeholder{color:var(--muted-dim);}
.field input:focus{border-color:var(--bull);}
.name-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:480px){.name-row{grid-template-columns:1fr;}}

.err{font-size:11.5px;color:#FF4D5E;margin-top:5px;display:none;font-family:var(--fm);}

/* ── SUBMIT ── */
.submit-btn{
  width:100%;padding:16px;border-radius:var(--r);border:none;
  background:#6D28D9;color:#fff;
  font-family:var(--fn);font-size:16px;font-weight:800;
  cursor:pointer;transition:opacity .18s,transform .18s;
  display:flex;align-items:center;justify-content:center;gap:10px;
  margin-top:8px;
}
.submit-btn:hover{background:#5B21B6;transform:translateY(-1px);}
.submit-btn:active{transform:scale(.99);}

/* ── SUCCESS ── */
.success-box{display:none;padding:40px 0;text-align:center;}
.success-icon{
  width:64px;height:64px;border-radius:50%;
  background:rgba(0,217,163,.12);
  display:flex;align-items:center;justify-content:center;
  font-size:26px;color:var(--bull);margin:0 auto 18px;
  border:1px solid rgba(0,217,163,.3);
}
.success-box h3{font-family:var(--fd);font-size:22px;font-weight:700;margin-bottom:8px;}
.success-box p{font-size:14px;color:var(--muted);line-height:1.75;}

/* ── DIVIDER ── */
.divider{height:1px;background:var(--border);margin:20px 0;}
</style>
</head>
<body>

<div class="topbar">
  <img src="https://i.ibb.co/N6rrhCpz/Whats-App-Image-2026-06-25-at-20-36-40.jpg" alt="fxeye" style="height:36px;width:auto;object-fit:contain;border-radius:6px;display:block;">
  <a href="index.html" class="back-btn" target="_self">
    <i class="fa-solid fa-arrow-left" style="font-size:11px;"></i> Back to Course
  </a>
</div>

<div class="page">
  <div class="page-heading">
    <h1>Get More Details</h1>
    <p>Fill in your details and our team will reach out to you shortly with full course information.</p>
  </div>

  <div id="formWrap">
    <div class="name-row">
      <div class="field">
        <label>First Name</label>
        <input type="text" id="fname" placeholder="Rahul" autocomplete="given-name">
        <div class="err" id="err-fname">Enter first name</div>
      </div>
      <div class="field">
        <label>Last Name</label>
        <input type="text" id="lname" placeholder="Sharma" autocomplete="family-name">
        <div class="err" id="err-lname">Enter last name</div>
      </div>
    </div>
    <div class="field">
      <label>Mobile Number</label>
      <input type="tel" id="mobile" placeholder="+91 98765 43210" maxlength="15" autocomplete="tel">
      <div class="err" id="err-mobile">Enter a valid mobile number</div>
    </div>

    <div class="divider"></div>

    <button class="submit-btn" onclick="submitForm()">
      <i class="fa-solid fa-paper-plane"></i> Submit Inquiry
    </button>
  </div>

  <div class="success-box" id="successBox">
    <div class="success-icon"><i class="fa-solid fa-check"></i></div>
    <h3>Inquiry Sent!</h3>
    <p>Thank you. Our team will connect with you very shortly. Keep an eye on your messages.</p>
  </div>
</div>

<script>
function submitForm(){
  const fname=document.getElementById('fname').value.trim();
  const lname=document.getElementById('lname').value.trim();
  const mobile=document.getElementById('mobile').value.trim();
  let ok=true;
  document.getElementById('err-fname').style.display='none';
  document.getElementById('err-lname').style.display='none';
  document.getElementById('err-mobile').style.display='none';
  if(!fname){document.getElementById('err-fname').style.display='block';ok=false;}
  if(!lname){document.getElementById('err-lname').style.display='block';ok=false;}
  if(!mobile||mobile.replace(/\D/g,'').length<7){document.getElementById('err-mobile').style.display='block';ok=false;}
  if(!ok)return;
  const msg='Name: '+fname+' '+lname+'%0AMobile: '+mobile+'%0ASource: fxeye Inquiry';
  const url='https://api.whatsapp.com/send?phone=916262625262&text='+msg;
  document.getElementById('formWrap').style.display='none';
  document.getElementById('successBox').style.display='block';
  setTimeout(()=>{window.open(url,'_blank');},800);
}
document.getElementById('mobile').addEventListener('input',function(){
  this.value=this.value.replace(/[^0-9+\s\-()]/g,'');
});
</script>
</body>
</html>
